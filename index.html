<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== LOCK SCREEN ==================== -->
  <div id="lock-screen">
    <div class="lock-inner">
      <h1 class="lock-title">LIST</h1>
      <p class="lock-hint">Private</p>
      <div class="lock-field">
        <input
          type="password"
          id="password-input"
          placeholder="password"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <p class="lock-enter">↵ to enter</p>
      <p class="lock-error" id="lock-error">access denied</p>
    </div>
  </div>

  <!-- ==================== MAIN APP ==================== -->
  <div id="app" class="hidden">

    <header class="app-header">
      <h1 class="app-title">LIST</h1>
      <div class="header-rule"></div>
      <div class="header-meta">
        <span id="date-display"></span>
        <span id="count-display"></span>
      </div>
    </header>

    <ul id="list"></ul>
    <p class="empty-state" id="empty-state">— nothing here —</p>

    <form class="add-form" id="add-form" autocomplete="off">
      <div class="add-form-inner">
        <span class="add-prompt">+</span>
        <input
          type="text"
          class="add-input"
          id="add-input"
          placeholder="add something..."
          maxlength="200"
          spellcheck="false"
        />
        <button type="submit" class="add-btn">Add</button>
      </div>
    </form>

  </div>

  <script src="script.js"></script>
</body>
</html>
